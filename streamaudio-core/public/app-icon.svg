<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft Glow for the bars -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="1.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Subtle drop shadow for the ring -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E3347" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background Squircle (Dark Slate with Deep Teal border) -->
  <rect x="32" y="32" width="960" height="960" rx="250" fill="#405974" stroke="#899FBC" stroke-width="8" />

  <!-- Outer dashed ring (Tech detail) -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="#A3B6CA" stroke-width="4" stroke-dasharray="15 35" opacity="0.3" />

  <!-- Main Ring (Deep Teal) -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="#899FBC" stroke-width="16" filter="url(#shadow)" />

  <!-- Waveform (Ash Grey with glow) -->
  <g fill="#CCD3E0" filter="url(#glow)">
    <rect x="340" y="440" width="36" height="144" rx="18" />
    <rect x="416" y="370" width="36" height="284" rx="18" />
    <rect x="494" y="290" width="36" height="444" rx="18" />
    <rect x="572" y="370" width="36" height="284" rx="18" />
    <rect x="648" y="440" width="36" height="144" rx="18" />
  </g>
</svg>
